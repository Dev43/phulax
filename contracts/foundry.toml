[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 512

[rpc_endpoints]
zerog_testnet = "${ZEROG_RPC_URL}"

[etherscan]
zerog_testnet = { key = "${ZEROG_EXPLORER_API_KEY}", url = "${ZEROG_EXPLORER_URL}" }
