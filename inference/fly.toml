app = "phulax-inference"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Build context must be the repo root so ml/prompt/ is in scope (see Dockerfile).
  # Run `fly deploy --config inference/fly.toml --dockerfile inference/Dockerfile`
  # from the repo root, OR keep the convenience script in inference/README.md.

[env]
  PHULAX_INFERENCE_PHASE = "auto"
  PHULAX_LOG_LEVEL = "INFO"
  # PHULAX_MODEL_DIR intentionally unset → stub mode until merged weights are
  # baked into a downstream image stage. Stub still HMAC-signs identically.
  # PHULAX_INFERENCE_HMAC_KEY is a fly secret, not an env var.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
